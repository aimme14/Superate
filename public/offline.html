<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#18181b" />
    <title>Sin conexión | Supérate.IA</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0b1020;
        color: #ffffff;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(560px, 100%);
        background: rgba(24, 24, 27, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        padding: 24px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }

      .logo {
        width: 84px;
        height: 84px;
        object-fit: contain;
        margin-bottom: 12px;
      }

      h1 {
        font-size: 1.5rem;
        margin: 0 0 8px;
      }

      p {
        margin: 0 0 20px;
        opacity: 0.92;
        line-height: 1.5;
      }

      button {
        border: 0;
        border-radius: 12px;
        padding: 10px 16px;
        font-weight: 600;
        color: #ffffff;
        background: #2563eb;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img class="logo" src="/assets/logo_tematica_blanca.png" alt="Supérate.IA" />
      <h1>Estás sin conexión</h1>
      <p>
        No pudimos cargar esta página en este momento. Revisa tu conexión e intenta
        nuevamente.
      </p>
      <button type="button" onclick="window.location.reload()">Reintentar</button>
    </main>
  </body>
</html>
